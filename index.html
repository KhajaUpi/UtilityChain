<style>
    :root {
        --accent: #ff8c00;
        --accent-glow: rgba(255, 140, 0, 0.5);
        --bg-dark: #060606;
        --card-bg: #0f0f0f;
        --text-main: #ffffff;
        --text-dim: #777777;
        --grid-color: rgba(255, 140, 0, 0.2); 
    }

    * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', system-ui, sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        overflow-x: hidden;
    }

    /* --- FAST ACTION HERO --- */
    .hero {
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
        background: radial-gradient(circle at center, #111 0%, #000 100%);
        overflow: hidden;
        perspective: 1200px; /* Added for deeper tilt */
    }

    /* Sped up grid (12s instead of 20s) */
    #grid-bg {
        content: "";
        position: absolute;
        width: 300%; height: 300%;
        top: -100%; left: -100%;
        background-image: 
            linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: rotateX(70deg);
        animation: grid-move 8s linear infinite; /* Increased Speed */
        z-index: 1;
        pointer-events: none;
    }

    @keyframes grid-move {
        0% { transform: rotateX(70deg) translateY(0); }
        100% { transform: rotateX(70deg) translateY(50px); }
    }

    .hero-content { 
        position: relative; 
        z-index: 10; 
        padding: 20px;
        animation: heroEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes heroEntrance {
        from { opacity: 0; transform: scale(0.9) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Glitch-style glow on text */
    .hero h1 { 
        font-size: clamp(3.5rem, 12vw, 7.5rem); 
        margin: 0; 
        font-weight: 900; 
        letter-spacing: -5px; 
        line-height: 0.85;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 0 0 20px rgba(255,255,255,0.1);
        filter: drop-shadow(0 0 15px var(--accent-glow));
    }

    /* --- REST OF STYLES (Kept from before) --- */
    .news-bar {
        width: 100%;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid #111;
        padding: 14px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .ticker-content { display: flex; justify-content: center; font-size: 0.8rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; }

    .card {
        background: var(--card-bg); border: 1px solid #1a1a1a; border-radius: 20px;
        width: 360px; padding: 45px; display: flex; flex-direction: column; position: relative;
    }
    .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.9); }

    .btn { background: var(--accent); color: #000; padding: 18px; border-radius: 8px; font-weight: 900; text-decoration: none; text-align: center; }
    .btn:hover { box-shadow: 0 0 30px var(--accent-glow); transform: scale(1.02); }
</style>

<body>
    <section class="hero" id="hero-sect">
        <div id="grid-bg"></div> <div class="hero-content">
            <span style="color:var(--accent); letter-spacing: 10px; font-weight: 900; font-size: 0.7rem; display:block; margin-bottom:10px;">UTILITYCHAIN ENGINE v1.0</span>
            <h1>PURE POWER.<br>NO WASTE.</h1>
            <p style="opacity:0.7; font-weight:500;">Zero bloat. Absolute performance for Windows.</p>
        </div>
    </section>

    <script>
        // PARALLAX EFFECT FOR GRID
        const hero = document.getElementById('hero-sect');
        const grid = document.getElementById('grid-bg');

        hero.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            grid.style.transform = `rotateX(70deg) translateX(${x}px) translateY(${y}px)`;
        });

        // Ticker and Filter logic remains the same
    </script>
</body>
